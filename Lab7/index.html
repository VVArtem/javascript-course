<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SPA Catalog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card-img-top {
            object-fit: cover;
            height: 200px;
        }
        #main-content {
            min-height: 400px;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="location.reload()">MyStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="location.reload()">Додому</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="catalog-link">Каталог</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="main-content" class="bg-white p-4 rounded shadow-sm">
            <div class="text-center py-5">
                <h1 class="display-4">Ласкаво просимо!</h1>
                <p class="lead">Це навчальний проект односторінкового застосунку на чистому JS.</p>
                <hr class="my-4">
                <button class="btn btn-primary btn-lg" onclick="document.getElementById('catalog-link').click()">
                    Переглянути каталог
                </button>
            </div>
        </div>
    </main>
    
    <script src="js/script.js"></script>

</body>

</html>
